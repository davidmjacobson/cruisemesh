name: UI localization

on:
  pull_request:
  push:
    branches: [master]

jobs:
  localization:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python tools/check_ui_localization.py
