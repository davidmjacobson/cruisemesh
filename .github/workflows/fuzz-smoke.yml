name: Fuzz smoke

on:
  pull_request:
    paths:
      - "core/**"
      - "fuzz/**"
      - ".github/workflows/fuzz-smoke.yml"
  push:
    branches: [master]
    paths:
      - "core/**"
      - "fuzz/**"
      - ".github/workflows/fuzz-smoke.yml"
  schedule:
    # Longer nightly run to actually explore, not just smoke-build.
    - cron: "0 5 * * *"

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - protocol_decoders
          - relay_wire
          - ble_reassembly
          - noise_handshake
          - backup_wire
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust nightly
        id: nightly
        uses: dtolnay/rust-toolchain@nightly
      # FR9: caches cargo's registry/git indexes and the `fuzz/` crate's own
      # target dir (a separate, non-workspace crate -- see fuzz/Cargo.toml).
      # Every matrix job previously cold-compiled cruisemesh-core + all its
      # deps from scratch.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
          # One cache lineage per fuzz target so ble_reassembly's build
          # doesn't evict noise_handshake's (all four ran in the same
          # cold-cache state before this).
          key: ${{ matrix.target }}
      - name: Cache cargo-fuzz
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-fuzz
          # FR9: was a single never-invalidating key -- a cargo-fuzz binary
          # built against a stale nightly could silently mismatch today's
          # `dtolnay/rust-toolchain@nightly` resolution. `cachekey` is that
          # action's own output for exactly this (hashes the resolved
          # toolchain, not just the "nightly" channel name).
          key: cargo-fuzz-bin-${{ runner.os }}-${{ steps.nightly.outputs.cachekey }}
      - name: Install cargo-fuzz
        # FR9: `|| true` used to swallow install failures -- a broken
        # install would then fail confusingly at the build/run step instead
        # of here, if it failed at all (a stale cached binary from the old
        # never-invalidating key could mask it entirely).
        # Install only on cache miss: a restored binary makes a plain
        # `cargo install` fail with "binary already exists", and the
        # toolchain-keyed cache above already guarantees a restored binary
        # matches today's nightly.
        run: |
          if ! command -v cargo-fuzz >/dev/null; then
            cargo install cargo-fuzz --locked
          fi
      # FR9: per-target corpus, keyed so it accumulates across nightly runs
      # instead of restarting exploration from zero every time (the whole
      # point of a 600s nightly run). New key per run (so the post-job save
      # step always writes a fresh entry); restore-keys falls back to the
      # most recent previous entry for this target via prefix match.
      - name: Cache fuzz corpus
        uses: actions/cache@v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-
      # Build always runs (cheap regression guard against API drift in core).
      - name: Build target
        run: cargo +nightly fuzz build ${{ matrix.target }}
      # PR/push: brief smoke. Scheduled: longer exploration.
      - name: Run target
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            SECONDS_TO_RUN=600
          else
            SECONDS_TO_RUN=60
          fi
          cargo +nightly fuzz run ${{ matrix.target }} -- \
            -max_total_time=$SECONDS_TO_RUN -rss_limit_mb=4096
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/
          if-no-files-found: ignore
