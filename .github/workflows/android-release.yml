name: Android release

# Pushing an `android-v*` tag cross-compiles the Rust core for all three device
# ABIs, builds a shrunk release APK (attached to a GitHub Release for
# sideloading onto the test fleet) and -- when the Play publishing secrets are
# configured -- also builds an upload-key-signed AAB and ships it to the Google
# Play **internal testing** track via the Play Developer API.
#
# The Play path is gated on secrets (PLAY_ENABLED below) so the workflow still
# works without them: with no secrets it behaves exactly like the old
# debug-signed-APK-only release. Required repository secrets to enable Play:
#   CRUISEMESH_RELEASE_STORE_B64      base64 (no newlines) of app/upload-keystore.jks
#   CRUISEMESH_RELEASE_STORE_PASSWORD keystore store password
#   CRUISEMESH_RELEASE_KEY_ALIAS      key alias (cruisemesh-upload)
#   CRUISEMESH_RELEASE_KEY_PASSWORD   key password
#   PLAY_SERVICE_ACCOUNT_JSON         full JSON of the Play Developer API service account
# The AAB is signed with the upload key; Google Play App Signing re-signs it
# with the app signing key for distribution. The sideload APK stays debug-signed
# (a separate gradle invocation without the signing env) so the test fleet's
# existing install lineage is undisturbed.

on:
  push:
    tags:
      - "android-v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      # Secrets can't be referenced in step `if:` conditions directly, so surface
      # their presence as a plain env flag ('true'/'false') the steps can gate on.
      PLAY_ENABLED: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' && secrets.CRUISEMESH_RELEASE_STORE_B64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # core/build-android.sh cross-compiles for these three ABIs via
          # cargo-ndk (arm64-v8a, armeabi-v7a, x86_64 -- see that script's
          # header comment for the authoritative list).
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      # Maintained action wrapping Google's ndk-bundle installer; sets
      # ANDROID_NDK_HOME/ANDROID_NDK_ROOT for later steps, which is exactly
      # what core/build-android.sh looks for (falls back to scanning
      # $ANDROID_HOME/ndk otherwise).
      - name: Install Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          local-cache: true

      - name: Build core for Android (cross-compile + Kotlin bindings)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: bash core/build-android.sh

      # versionCode must be unique and strictly increasing for Play/adb to accept
      # an upgrade. Epoch seconds at build time is monotonic for sequential
      # releases AND stays above the epoch-style versionCodes already live on the
      # Play track -- a commit count (the previous scheme, when this workflow only
      # made a GitHub Release and never touched Play) would sit far below them and
      # Play would reject the upload. Fits under the 2100000000 ceiling until
      # ~2036. versionName is the tag with the "android-v" prefix stripped
      # (e.g. tag `android-v1.2.3` -> "1.2.3").
      - name: Derive version from tag
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          version_name="${tag#android-v}"
          version_code="$(date +%s)"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"

      - name: gradlew assembleRelease (debug-signed APK for sideloading)
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease \
            -PversionCodeOverride=${{ steps.version.outputs.version_code }} \
            -PversionNameOverride=${{ steps.version.outputs.version_name }}

      - name: Rename APK for the release asset
        id: apk
        run: |
          src="android/app/build/outputs/apk/release/app-release.apk"
          dest="cruisemesh-${{ steps.version.outputs.tag }}.apk"
          cp "$src" "$dest"
          echo "path=$dest" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and attach APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.apk.outputs.path }}" \
            --title "CruiseMesh Android ${{ steps.version.outputs.version_name }}" \
            --notes "Automated build from ${{ github.sha }}. APK is debug-signed for sideloading; the Play internal-testing build is the upload-key-signed AAB (when Play secrets are configured)." \
            --generate-notes

      # --- Play internal-testing publish (only when secrets are configured) ---

      - name: Decode upload keystore
        if: env.PLAY_ENABLED == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.CRUISEMESH_RELEASE_STORE_B64 }}
        run: printf '%s' "$KEYSTORE_B64" | base64 -d > android/app/upload-keystore.jks

      - name: gradlew bundleRelease (upload-key-signed AAB)
        if: env.PLAY_ENABLED == 'true'
        working-directory: android
        env:
          # build.gradle.kts's signingProp() reads these when app/keystore.properties
          # is absent (it is -- gitignored, never in CI). STORE_FILE is resolved
          # relative to android/app/, matching the decode path above.
          CRUISEMESH_RELEASE_STORE_FILE: upload-keystore.jks
          CRUISEMESH_RELEASE_STORE_PASSWORD: ${{ secrets.CRUISEMESH_RELEASE_STORE_PASSWORD }}
          CRUISEMESH_RELEASE_KEY_ALIAS: ${{ secrets.CRUISEMESH_RELEASE_KEY_ALIAS }}
          CRUISEMESH_RELEASE_KEY_PASSWORD: ${{ secrets.CRUISEMESH_RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew :app:bundleRelease \
            -PversionCodeOverride=${{ steps.version.outputs.version_code }} \
            -PversionNameOverride=${{ steps.version.outputs.version_name }}

      - name: Publish AAB to Play internal testing
        if: env.PLAY_ENABLED == 'true'
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          python3 -m pip install --quiet --disable-pip-version-check cryptography requests
          umask 077
          printf '%s' "$PLAY_SERVICE_ACCOUNT_JSON" > play-sa.json
          trap 'rm -f play-sa.json' EXIT
          python3 tools/play_publish.py \
            play-sa.json \
            android/app/build/outputs/bundle/release/app-release.aab \
            "${{ steps.version.outputs.version_name }}"

      - name: Clean up decoded keystore
        if: always() && env.PLAY_ENABLED == 'true'
        run: rm -f android/app/upload-keystore.jks
