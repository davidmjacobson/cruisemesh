name: PR 40 iOS validation

on:
  pull_request:
    branches:
      - agent/friends-of-friends

jobs:
  ios-tests:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Select stable Rust
        run: rustup default stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build the Rust XCFramework
        run: bash core/build-ios.sh

      - name: Generate the Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Run iOS unit tests
        working-directory: ios
        run: |
          simulator_id="$({
            xcrun simctl list devices available -j | python3 -c '
          import json, sys
          devices = json.load(sys.stdin)["devices"]
          for runtime in devices.values():
              for device in runtime:
                  if device.get("isAvailable") and device["name"].startswith("iPhone"):
                      print(device["udid"])
                      raise SystemExit(0)
          raise SystemExit("no available iPhone simulator")
          '
          })"
          xcodebuild test \
            -project CruiseMesh.xcodeproj \
            -scheme CruiseMesh \
            -destination "platform=iOS Simulator,id=${simulator_id}" \
            CODE_SIGNING_ALLOWED=NO
