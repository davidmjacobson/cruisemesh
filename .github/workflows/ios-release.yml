name: iOS release

# Pushing an `ios-v*` tag builds the app on a GitHub macOS runner and -- when the
# signing secrets are configured -- archives it, signs it with a dedicated CI
# distribution certificate + provisioning profile, uploads it to TestFlight, and
# distributes it to the beta group. The iOS mirror of android-release.yml.
#
# Signing is MANUAL: the distribution cert (.p12) and App Store provisioning
# profile are imported from secrets into a throwaway keychain, and
# `xcodebuild -exportArchive` signs entirely locally. This deliberately avoids
# cloud/automatic signing (-allowProvisioningUpdates), whose export-time call to
# Apple's xcbuild provisioning portal intermittently 502/504s and blocked
# releases even when the build was fine. Nothing here touches Apple's portal at
# release time.
#
# Gated on IOS_ENABLED (secrets present) so this is a no-op-safe smoke build in
# forks / before secrets exist. Required secrets:
#   IOS_DIST_CERT_P12_B64      base64 of the distribution .p12
#   IOS_DIST_CERT_PASSWORD     .p12 password
#   IOS_PROVISION_PROFILE_B64  base64 of the App Store .mobileprovision
#   ASC_API_KEY_ID             App Store Connect API key ID (for the upload)
#   ASC_API_ISSUER_ID          App Store Connect API issuer ID
#   ASC_API_KEY_P8             contents of the AuthKey_<id>.p8
# The provisioning profile is named "CruiseMesh CI App Store" and must match the
# provisioningProfiles entry in ios/ExportOptions-AppStoreConnect.plist.
# CFBundleVersion is stamped to epoch seconds (monotonic, above existing
# TestFlight builds); CFBundleShortVersionString comes from the tag.

on:
  push:
    tags:
      - "ios-v*"

jobs:
  release:
    runs-on: macos-latest
    env:
      # Secrets can't be used in step `if:` directly; surface presence as a flag.
      IOS_ENABLED: ${{ secrets.IOS_DIST_CERT_P12_B64 != '' && secrets.ASC_API_KEY_P8 != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Rust stable + iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios
      - uses: Swatinem/rust-cache@v2

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build core + Swift bindings + xcframework
        run: bash core/build-ios.sh

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      # xcodegen writes Info.plist from project.yml, so stamp the version AFTER
      # generating. Build number is epoch seconds: monotonic and above the build
      # numbers already on TestFlight. Marketing version is the tag sans "ios-v",
      # reduced to the leading 1-3 integer groups: App Store Connect rejects a
      # CFBundleShortVersionString that isn't 1-3 period-separated integers, so a
      # tag like `ios-v1.2.0-rc1` yields "1.2.0" (the suffix is dropped).
      - name: Stamp version (marketing from tag, build = epoch)
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          raw="${tag#ios-v}"
          marketing="$(printf '%s' "$raw" | grep -oE '^[0-9]+(\.[0-9]+){0,2}' || true)"
          [ -n "$marketing" ] || marketing="0.0.0"
          build="$(date +%s)"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $marketing" ios/CruiseMesh/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $build" ios/CruiseMesh/Info.plist
          echo "marketing=$marketing" >> "$GITHUB_OUTPUT"
          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "Version $marketing ($build)"

      # Unsigned archive; the distribution signing is applied at export using the
      # imported cert + profile.
      - name: Archive (unsigned)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild archive \
            -project CruiseMesh.xcodeproj \
            -scheme CruiseMesh \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/CruiseMesh.xcarchive \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Import signing certificate and profile
        if: env.IOS_ENABLED == 'true'
        env:
          IOS_DIST_CERT_P12_B64: ${{ secrets.IOS_DIST_CERT_P12_B64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          IOS_PROVISION_PROFILE_B64: ${{ secrets.IOS_PROVISION_PROFILE_B64 }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/ci-signing.keychain-db"
          KC_PW="$(openssl rand -hex 20)"
          security create-keychain -p "$KC_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KC_PW" "$KEYCHAIN"
          echo "$IOS_DIST_CERT_P12_B64" | base64 -d > "$RUNNER_TEMP/dist.p12"
          security import "$RUNNER_TEMP/dist.p12" -P "$IOS_DIST_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/dist.p12"
          # Put the CI keychain first, keep login for Apple's WWDR intermediates.
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KC_PW" "$KEYCHAIN" >/dev/null
          PROFILES="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES"
          echo "$IOS_PROVISION_PROFILE_B64" | base64 -d > "$PROFILES/CruiseMesh-CI.mobileprovision"
          echo "Imported signing identity:"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Write App Store Connect API key
        if: env.IOS_ENABLED == 'true'
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          mkdir -p "$HOME/private_keys"
          chmod 700 "$HOME/private_keys"
          printf '%s' "$ASC_API_KEY_P8" > "$HOME/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"

      - name: Export (manual-signed) and upload to TestFlight
        if: env.IOS_ENABLED == 'true'
        working-directory: ios
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath build/CruiseMesh.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions-AppStoreConnect.plist
          xcrun altool --upload-app \
            -f build/export/CruiseMesh.ipa \
            -t ios \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID"
          echo "Uploaded build ${{ steps.version.outputs.build }} (${{ steps.version.outputs.marketing }}) to TestFlight."

      # Best-effort: wait for processing, add to the beta group, submit for beta
      # review. continue-on-error so a slow queue never reds a landed release.
      - name: Distribute to the TestFlight beta group
        if: env.IOS_ENABLED == 'true'
        continue-on-error: true
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          python3 -m pip install --quiet --disable-pip-version-check pyjwt cryptography requests
          python3 tools/testflight_distribute.py \
            "$HOME/private_keys/AuthKey_${ASC_API_KEY_ID}.p8" \
            "$ASC_API_KEY_ID" \
            "$ASC_API_ISSUER_ID" \
            "${{ steps.version.outputs.build }}"

      - name: Note skipped publish
        if: env.IOS_ENABLED != 'true'
        run: echo "Signing secrets not set — built + archived only; skipped signing/upload."

      - name: Clean up secrets from runner
        if: always()
        run: |
          rm -rf "$HOME/private_keys"
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/CruiseMesh-CI.mobileprovision" || true
