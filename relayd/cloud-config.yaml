#cloud-config
# First-boot configuration for the CruiseMesh hosted relay (Ubuntu 24.04, Hetzner).
# Paste into the "Cloud config" field when creating the server (or pass via
# --user-data). It hardens the box and installs Docker; the relay itself is
# deployed afterward with provision-hetzner.sh (once DNS points here and the
# `relay` branch is pushed). See DEPLOY.md.
#
# Approach mirrors https://community.hetzner.com/tutorials/basic-cloud-config
# with the relay's SSH key baked in.

# --- non-root sudo user; the relay SSH key is authorized for it ---
users:
  - name: deploy
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAgjpE3B6mH6NXe1/WsF4uJ8zWzFEtT0jzB8PZP0j/3B cruisemesh-relay

# key-based auth only; no passwords anywhere
ssh_pwauth: false
disable_root: false   # keep key-based root as a fallback (provision script needs root)

package_update: true
package_upgrade: true
packages:
  - ufw
  - fail2ban
  - unattended-upgrades
  - ca-certificates
  - curl
  - git
  - openssl

write_files:
  # SSH hardening: key-only, root reachable by key but never by password.
  - path: /etc/ssh/sshd_config.d/99-cruisemesh.conf
    content: |
      PermitRootLogin prohibit-password
      PasswordAuthentication no
      KbdInteractiveAuthentication no
  # fail2ban on 24.04 reads the systemd journal, not /var/log/auth.log.
  - path: /etc/fail2ban/jail.local
    content: |
      [sshd]
      enabled = true
      backend = systemd
      maxretry = 5
      bantime = 1h

runcmd:
  # root gets the same key as a fallback login.
  - [ mkdir, -p, /root/.ssh ]
  - [ chmod, "700", /root/.ssh ]
  - bash -c "echo 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAgjpE3B6mH6NXe1/WsF4uJ8zWzFEtT0jzB8PZP0j/3B cruisemesh-relay' > /root/.ssh/authorized_keys"
  - [ chmod, "600", /root/.ssh/authorized_keys ]
  # Firewall: SSH + HTTP/HTTPS (Caddy) only.
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable
  # Docker Engine + compose plugin (official script; auto-detects arm64/x86).
  - bash -c "curl -fsSL https://get.docker.com | sh"
  - systemctl enable --now docker
  - usermod -aG docker deploy
  # Apply hardening + brute-force protection.
  - systemctl restart ssh || systemctl restart sshd
  - systemctl enable --now fail2ban

  # --- OPTIONAL: auto-deploy the relay at first boot. Only uncomment if the
  #     `relay` branch is already pushed AND DNS relay.cruisemesh.app already
  #     points at this box (else the clone or the TLS cert will fail). Prints
  #     the generated admin token into /var/log/cloud-init-output.log.
  # - curl -fsSL https://raw.githubusercontent.com/davidmjacobson/cruisemesh/relay/relayd/provision-hetzner.sh -o /root/provision.sh
  # - bash /root/provision.sh

final_message: "CruiseMesh relay box ready after $UPTIME s. SSH in and run provision-hetzner.sh."
