# CruiseMesh relay — mailbox + TLS reverse proxy.
#
# Usage (from this directory, on a VPS with a public DNS name):
#   export CRUISEMESH_RELAY_TOKENS="your-long-random-family-token"
#   export RELAY_DOMAIN="relay.example.com"
#   docker compose up -d --build
#
# See DEPLOY.md for the full walkthrough (tokens, DNS, DB path gotcha).

services:
  relayd:
    build:
      context: ..
      dockerfile: relayd/Dockerfile
      args:
        # FR4: `.git` is not in the build context (see Dockerfile comment);
        # pass the real commit through explicitly, e.g.:
        #   export GIT_SHA=$(git rev-parse --short HEAD)
        #   docker compose up -d --build
        # Falls back to "unknown" if unset.
        GIT_SHA: ${GIT_SHA:-unknown}
    environment:
      # Comma-separated family bearer tokens. Required for self-hosted use;
      # a hosted deploy that provisions families via the admin API may set
      # this to an empty string. Generate with:
      #   openssl rand -hex 32
      # (`?` not `:?`: the var must be exported, but an explicit empty string
      # is allowed for hosted deploys; relayd itself still refuses to start
      # when both the allowlist and the admin token are missing.)
      CRUISEMESH_RELAY_TOKENS: ${CRUISEMESH_RELAY_TOKENS?set CRUISEMESH_RELAY_TOKENS}
      # Optional: enables the /admin/families provisioning API (DEPLOY.md §11)
      # used by the cruisemesh.app purchase flow. Leave unset for self-hosted
      # deploys — the admin routes then answer 404.
      CRUISEMESH_RELAY_ADMIN_TOKEN: ${CRUISEMESH_RELAY_ADMIN_TOKEN:-}
      # Absolute path inside the container — do NOT rely on the process CWD.
      # (Localtunnel-era footgun: a relative default silently wrote the DB
      # somewhere else than the file you were watching.)
      CRUISEMESH_RELAY_DB: /data/cruisemesh-relayd.sqlite
      CRUISEMESH_RELAY_BIND: 0.0.0.0:8080
      # FR2: default to info-level logs so a field incident is debuggable
      # without redeploying with an env var change first. Override with a
      # more/less verbose value as needed (e.g. RUST_LOG=debug,tower_http=off).
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - relay-data:/data
    restart: unless-stopped
    # Not published on the host — only Caddy talks to it on the compose network.
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      RELAY_DOMAIN: ${RELAY_DOMAIN:?set RELAY_DOMAIN to your public hostname}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - relayd
    restart: unless-stopped

volumes:
  # Durable SQLite; back this up if the mailbox must survive host rebuilds.
  relay-data:
  caddy-data:
  caddy-config:
